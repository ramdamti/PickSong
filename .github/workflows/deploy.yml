name: Deploy PickSong

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-picksong
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate JS syntax
        run: |
          node --check src/config.js
          node --check src/state.js
          node --check src/llm.js
          node --check src/whatsapp.js
          node --check src/main.js

      - name: Install deps and restart service
        env:
          RESTART_CMD: ${{ secrets.RESTART_CMD }}
        run: |
          export PUPPETEER_SKIP_DOWNLOAD=true
          npm install --omit=dev
          if [ -n "$RESTART_CMD" ]; then
            eval "$RESTART_CMD"
          fi
