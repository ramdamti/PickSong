name: Deploy PickSong

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-picksong
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate JS syntax
        run: |
          node --check src/config.js
          node --check src/state.js
          node --check src/llm.js
          node --check src/chords.js
          node --check src/whatsapp.js
          node --check src/main.js
          node --check scripts/chords-dry-run.js
          node --check test/chords.test.js

      - name: Install deps and restart service
        run: |
          set -eu
          export PUPPETEER_SKIP_DOWNLOAD=true
          npm install --omit=dev
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          export DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus"
          export PICKSONG_SESSION_DIR="/home/ubuntu/picksong-data/wwebjs/session-picksong"
          export PICKSONG_LOCK_FILE="${PICKSONG_SESSION_DIR}/SingletonLock"
          if [ ! -S "${XDG_RUNTIME_DIR}/bus" ]; then
            echo "User systemd bus not available at ${XDG_RUNTIME_DIR}/bus" >&2
            echo "Enable lingering for the runner user: loginctl enable-linger $(whoami)" >&2
            exit 1
          fi
          systemctl --user stop picksong || true

          for i in $(seq 1 20); do
            if [ ! -e "${PICKSONG_LOCK_FILE}" ]; then
              break
            fi
            if command -v fuser >/dev/null 2>&1; then
              if ! fuser "${PICKSONG_LOCK_FILE}" >/dev/null 2>&1; then
                break
              fi
            elif ! pgrep -f "${PICKSONG_SESSION_DIR}" >/dev/null; then
              break
            fi
            sleep 1
          done

          if [ -e "${PICKSONG_LOCK_FILE}" ]; then
            if command -v fuser >/dev/null 2>&1 && fuser "${PICKSONG_LOCK_FILE}" >/dev/null 2>&1; then
              echo "Killing lock holder for ${PICKSONG_LOCK_FILE}" >&2
              fuser -k "${PICKSONG_LOCK_FILE}" || true
            elif pgrep -f "${PICKSONG_SESSION_DIR}" >/dev/null; then
              echo "Killing leftover Chromium processes for ${PICKSONG_SESSION_DIR}" >&2
              pkill -f "${PICKSONG_SESSION_DIR}" || true
            fi
            sleep 2
          fi

          if [ -e "${PICKSONG_LOCK_FILE}" ]; then
            if command -v fuser >/dev/null 2>&1 && fuser "${PICKSONG_LOCK_FILE}" >/dev/null 2>&1; then
              echo "Chromium is still holding ${PICKSONG_LOCK_FILE}" >&2
              exit 1
            fi
            if pgrep -f "${PICKSONG_SESSION_DIR}" >/dev/null; then
              echo "Chromium is still holding ${PICKSONG_SESSION_DIR}" >&2
              exit 1
            fi
          fi

          if systemctl --user is-active --quiet picksong; then
            echo "picksong is still active after stop request" >&2
            exit 1
          fi

          systemctl --user daemon-reload

          if ! systemctl --user start picksong; then
            systemctl --user status --no-pager --full picksong || true
            journalctl --user -u picksong -n 200 --no-pager || true
            exit 1
          fi

          if ! systemctl --user is-active --quiet picksong; then
            systemctl --user status --no-pager --full picksong || true
            journalctl --user -u picksong -n 200 --no-pager || true
            echo "picksong failed to become active" >&2
            exit 1
          fi
